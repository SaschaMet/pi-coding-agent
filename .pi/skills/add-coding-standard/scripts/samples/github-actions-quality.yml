name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  coding-standard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        if: hashFiles('pyproject.toml') != ''
        with:
          python-version: "3.12"
      - run: ./scripts/run-coding-standard.sh --mode ci --strict
